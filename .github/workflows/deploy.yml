name: Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & generate
        run: |
          npm install --legacy-peer-deps
          npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/nexora

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCK_DATA: true
          NEXT_PUBLIC_APP_URL: https://nexora.vercel.app
          NEXT_PUBLIC_INFURA_API_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_API_KEY }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: postgresql://user:pass@localhost:5432/nexora
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

  deploy-vercel:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    needs: check-ci
    if: ${{ vars.VERCEL_ORG_ID != '' }}
    environment:
      name: production
      url: https://nexora.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "production_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

  migrate-db:
    name: DB Migration → Railway
    runs-on: ubuntu-latest
    needs: check-ci
    if: ${{ vars.HAS_PRODUCTION_DB == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}

      - name: Verify DB connection
        run: npx prisma db execute --stdin <<< "SELECT 1;"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-vercel, migrate-db]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "================================"
          echo "NEXORA Deployment Summary"
          echo "================================"
          echo "Branch:       ${{ github.ref_name }}"
          echo "Commit:       ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Vercel:       ${{ needs.deploy-vercel.result }}"
          echo "DB Migration: ${{ needs.migrate-db.result }}"
          echo "================================"
