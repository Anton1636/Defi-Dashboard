name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────
  # Job 1: TypeScript + ESLint
  # ─────────────────────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://user:pass@localhost:5432/nexora' }}

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

  # ─────────────────────────────────────
  # Job 2: Build check
  # ─────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/nexora

      - name: Build Next.js
        run: npm run build
        env:
          # Use mock data in CI — no real DB or wallet needed
          NEXT_PUBLIC_USE_MOCK_DATA: true
          NEXT_PUBLIC_APP_URL: https://nexora.vercel.app
          NEXT_PUBLIC_INFURA_API_KEY: ${{ secrets.NEXT_PUBLIC_INFURA_API_KEY || 'ci-placeholder' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || 'ci-placeholder' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'ci-placeholder-32-chars-minimum-x' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-placeholder' }}
          DATABASE_URL: postgresql://user:pass@localhost:5432/nexora
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1

  # ─────────────────────────────────────
  # Job 3: Bundle size check
  # ─────────────────────────────────────
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      - name: Check bundle size
        run: |
          echo "=== Build output sizes ==="
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -rh | head -20 || echo "No chunks found"
          echo ""
          echo "=== Total .next size ==="
          du -sh .next/
          echo ""
          # Fail if total .next > 100MB
          SIZE=$(du -sm .next/ | cut -f1)
          echo "Total build size: ${SIZE}MB"
          if [ "$SIZE" -gt 100 ]; then
            echo "❌ Build size ${SIZE}MB exceeds 100MB limit"
            exit 1
          else
            echo "✅ Build size ${SIZE}MB is within limit"
          fi

  # ─────────────────────────────────────
  # Job 4: Dependency audit
  # ─────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run npm audit
        # Only fail on high/critical vulnerabilities
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for known Web3 vulnerabilities
        run: |
          echo "=== Checking Web3 dependencies ==="
          npm list wagmi viem @rainbow-me/rainbowkit 2>/dev/null | head -20
          echo "✅ Web3 dependency versions logged"
